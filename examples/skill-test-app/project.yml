name: SkillTestApp
options:
  bundleIdPrefix: com.mori.skilltest
  deploymentTarget:
    iOS: "17.0"
packages:
  SkillTestUI:
    path: .
targets:
  SkillTestApp:
    type: application
    platform: iOS
    sources:
      - SkillTestApp
    dependencies:
      - package: SkillTestUI
        product: SkillTestUI
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.mori.skilltest.app
      GENERATE_INFOPLIST_FILE: YES
      CURRENT_PROJECT_VERSION: 1
      MARKETING_VERSION: 1.0
      SWIFT_VERSION: "5.9"
